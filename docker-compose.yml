version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: m4
      POSTGRES_PASSWORD: m4password
      POSTGRES_DB: ozeldersal
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    environment:
      - DATABASE_URL=postgresql://m4:m4password@db:5432/ozeldersal?schema=public
      - NEXTAUTH_URL=http://ozeldersal.com
      - AUTH_SECRET=${AUTH_SECRET} # Ensure AUTH_SECRET is exported or in .env
    ports:
      - "3000:3000"
    depends_on:
      - db

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web

volumes:
  pgdata:
